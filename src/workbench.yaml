# Moongate Dark 编辑器 UI 颜色
# 所有颜色值引用 src/core/colors.yaml 中的变量
# 海拔系统已集成：surfaceGround（地面）、surfaceRaised（隆起）、surfaceFloating（漂浮）、surfaceTooltip（提示）、borderFloating（浮层边框）

# 基础环境
editor.background: "${surfaceGround}"
editor.foreground: "${text}"

# 标题栏（标题栏可略高于编辑器，使用 raised 层）
titleBar.activeBackground: "${surfaceRaised}"
titleBar.activeForeground: "${text}"
titleBar.inactiveBackground: "${surfaceRaised}"
titleBar.inactiveForeground: "${textInactive}"
titleBar.border: "${border}"

# 菜单栏（菜单为浮层，使用 floating 层）
menu.background: "${surfaceFloating}"
menu.foreground: "${text}"
menu.selectionBackground: "${primary}"
menu.selectionForeground: "${white}"
menu.border: "${borderFloating}"

# 活动栏（活动栏为次级区域，使用 raised 层）
activityBar.background: "${surfaceRaised}"
activityBar.foreground: "${text}"
activityBar.inactiveForeground: "${textInactive}"
activityBar.border: "${border}"
activityBar.activeBorder: "${primary}"
activityBarBadge.background: "${primary}"
activityBarBadge.foreground: "${white}"

# 侧边栏（侧边栏为次级区域，使用 raised 层）
sideBar.background: "${surfaceRaised}"
sideBar.foreground: "${text}"
sideBar.border: "${border}"
sideBarTitle.foreground: "${textInactive}"
sideBarSectionHeader.background: "${surfaceGround}" # 节标题可保持地面或略高，这里保留原意使用 ground
sideBarSectionHeader.foreground: "${text}"

# 状态栏（状态栏可保持地面或略高，这里使用 ground，与编辑器背景一致）
statusBar.background: "${surfaceGround}"
statusBar.foreground: "${textDim}"
statusBar.border: "${border}"
statusBar.noFolderBackground: "${surfaceGround}"
statusBar.noFolderForeground: "${textInactive}"
statusBar.debuggingBackground: "${success}"
statusBar.debuggingForeground: "${surfaceGround}"
statusBarItem.activeBackground: "${bgHover}" # 保持原变量（半透明）
statusBarItem.hoverBackground: "${primary}10" # 保持原变量
statusBarItem.prominentBackground: "${surfaceRaised}"
statusBarItem.prominentHoverBackground: "${hoverBg}"
statusBarItem.remoteBackground: "${surfaceGround}"
statusBarItem.remoteForeground: "${textInactive}"

# 选项卡（选项卡栏为次级区域，使用 raised；选项卡本身背景为地面）
tab.activeBackground: "${surfaceGround}"
tab.activeForeground: "${text}"
tab.activeBorder: "${primary}"
tab.inactiveBackground: "${surfaceRaised}"
tab.inactiveForeground: "${textInactive}"
tab.border: "${border}"
tab.hoverBackground: "${hoverBg}"
tab.hoverForeground: "${text}"

# 编辑器组
editorGroup.border: "${border}"
editorGroupHeader.tabsBackground: "${surfaceRaised}"

# 面板（面板使用地面，保持沉浸）
panel.background: "${surfaceGround}"
panel.border: "${border}"
panelTitle.activeBorder: "${primary}"
panelTitle.activeForeground: "${text}"
panelTitle.inactiveForeground: "${textInactive}"

# 输入框（输入框通常为浮层，使用 floating 层）
input.background: "${surfaceFloating}"
input.foreground: "${text}"
input.border: "${borderFloating}"
input.placeholderForeground: "${textInactive}"
inputOption.activeBackground: "${primary}"
inputOption.activeForeground: "${white}"
inputValidation.errorBackground: "${error}"
inputValidation.errorBorder: "${error}"
inputValidation.infoBackground: "${primary}"
inputValidation.infoBorder: "${primary}"
inputValidation.warningBackground: "${warning}"
inputValidation.warningBorder: "${warning}"

# 下拉框（下拉框为浮层，使用 floating 层）
dropdown.background: "${surfaceFloating}"
dropdown.foreground: "${text}"
dropdown.border: "${borderFloating}"

# 按钮（按钮背景使用主色，前景白色）
button.background: "${primary}"
button.foreground: "${white}"
button.hoverBackground: "${buttonHoverBg}"
button.secondaryBackground: "${surfaceRaised}"
button.secondaryForeground: "${text}"

# 徽章
badge.background: "${primary}"
badge.foreground: "${white}"

# 滚动条
scrollbar.shadow: "${surfaceGround}"
scrollbarSlider.background: "${scrollbar}60"
scrollbarSlider.hoverBackground: "${scrollbar}80"
scrollbarSlider.activeBackground: "${scrollbar}"

# 列表/树（列表项悬停/选中保持原有交互色，背景使用 raised 层）
list.activeSelectionBackground: "${selectedBg}"
list.activeSelectionForeground: "${text}"
list.hoverBackground: "${hoverBg}"
list.hoverForeground: "${text}"
list.focusBackground: "${selectedBg}"
list.focusForeground: "${text}"
list.inactiveSelectionBackground: "${surfaceRaised}"
list.inactiveSelectionForeground: "${textInactive}"
list.highlightForeground: "${primary}"
list.errorForeground: "${error}"
list.warningForeground: "${warning}"

# 树
tree.indentGuidesStroke: "${border}"

# 快速选择器（浮层，使用 floating 层）
quickInput.background: "${surfaceFloating}"
quickInput.foreground: "${text}"
quickInputTitle.background: "${surfaceGround}" # 标题可略低，使用 ground
pickerGroup.border: "${border}"
pickerGroup.foreground: "${textInactive}"

# 编辑器细节（保持不变）
editorLineNumber.foreground: "${textInactive}"
editorLineNumber.activeForeground: "${text}"
editorCursor.foreground: "${primary}"
editor.selectionBackground: "${primary}40"
editor.selectionHighlightBorder: "${primary}80"
editor.selectionHighlightBackground: "${primary}20"
editor.findMatchBackground: "${primary}40"
editor.findMatchBorder: "${primary}"
editor.findMatchHighlightBackground: "${primary}20"
editor.findMatchHighlightBorder: "${primary}00"
editor.findRangeHighlightBackground: "${primary}10"
editor.findRangeHighlightBorder: "${primary}00"
editor.wordHighlightBackground: "${primary}30"
editor.wordHighlightStrongBackground: "${primary}50"
editorWhitespace.foreground: "${border}"
editorIndentGuide.background1: "${border}"
editorIndentGuide.activeBackground1: "${primary}"
editorRuler.foreground: "${border}"
editorCodeLens.foreground: "${textInactive}"
editorBracketMatch.background: "${primary}30"
editorBracketMatch.border: "${primary}"
editorOverviewRuler.border: "${border}"
editorOverviewRuler.modifiedForeground: "${warning}"
editorOverviewRuler.addedForeground: "${success}"
editorOverviewRuler.deletedForeground: "${error}"
editorError.foreground: "${error}"
editorWarning.foreground: "${warning}"
editorInfo.foreground: "${primary}"
editorHint.foreground: "${textInactive}"
editorError.border: "${error}80"
editorWarning.border: "${warning}80"

# 差异编辑器
diffEditor.insertedTextBackground: "${success}20"
diffEditor.removedTextBackground: "${error}20"
diffEditor.border: "${border}"

# 面包屑
breadcrumb.background: "${surfaceGround}"
breadcrumb.foreground: "${textInactive}"
breadcrumb.focusForeground: "${text}"
breadcrumbPicker.background: "${surfaceFloating}" # 面包屑选择器为浮层

# 编辑器小部件（建议小部件、悬停小部件等浮层）
editorWidget.background: "${surfaceFloating}"
editorWidget.foreground: "${text}"
editorWidget.border: "${borderFloating}"
editorSuggestWidget.background: "${surfaceFloating}"
editorSuggestWidget.border: "${borderFloating}"
editorSuggestWidget.foreground: "${text}"
editorSuggestWidget.highlightForeground: "${primary}"
editorSuggestWidget.selectedBackground: "${selectedBg}"
editorHoverWidget.background: "${surfaceTooltip}" # 悬停提示用最高层
editorHoverWidget.foreground: "${text}"
editorHoverWidget.border: "${borderFloating}"

# 调试（保持不变）
debugToolBar.background: "${surfaceRaised}"
debugToolBar.border: "${border}"
debugIcon.startForeground: "${debugStart}"
debugIcon.pauseForeground: "${debugPause}"
debugIcon.stopForeground: "${debugStop}"
debugIcon.disconnectForeground: "${error}"
debugIcon.continueForeground: "${debugStart}"
debugIcon.breakpointForeground: "${error}"
debugIcon.breakpointDisabledForeground: "${textInactive}"

# Git 装饰（保持不变）
gitDecoration.addedResourceForeground: "${gitAdded}"
gitDecoration.modifiedResourceForeground: "${gitModified}"
gitDecoration.deletedResourceForeground: "${gitDeleted}"
gitDecoration.untrackedResourceForeground: "${gitUntracked}"
gitDecoration.ignoredResourceForeground: "${gitIgnored}"
gitDecoration.conflictingResourceForeground: "${gitModified}"

# 内嵌提示（保持不变）
editorInlayHint.foreground: "${punctuation}"
editorInlayHint.background: "${surfaceRaised}40" # 半透明背景，使用 raised 层
editorInlayHint.typeForeground: "${punctuation}"
editorInlayHint.parameterForeground: "${punctuation}"

# 终端
terminal.background: "${surfaceGround}"
terminal.foreground: "${text}"
terminalCursor.foreground: "${primary}"
terminal.selectionBackground: "${primary}40"
terminal.border: "${border}"
terminal.ansiBlack: "${ansiBlack}"
terminal.ansiRed: "${ansiRed}"
terminal.ansiGreen: "${ansiGreen}"
terminal.ansiYellow: "${ansiYellow}"
terminal.ansiBlue: "${ansiBlue}"
terminal.ansiMagenta: "${ansiMagenta}"
terminal.ansiCyan: "${ansiCyan}"
terminal.ansiWhite: "${ansiWhite}"
terminal.ansiBrightBlack: "${ansiBrightBlack}"
terminal.ansiBrightRed: "${ansiBrightRed}"
terminal.ansiBrightGreen: "${ansiBrightGreen}"
terminal.ansiBrightYellow: "${ansiBrightYellow}"
terminal.ansiBrightBlue: "${ansiBrightBlue}"
terminal.ansiBrightMagenta: "${ansiBrightMagenta}"
terminal.ansiBrightCyan: "${ansiBrightCyan}"
terminal.ansiBrightWhite: "${ansiBrightWhite}"

# 通知（浮层）
notifications.background: "${surfaceFloating}"
notifications.foreground: "${text}"
notifications.border: "${borderFloating}"

# 扩展
extensionButton.prominentBackground: "${primary}"
extensionButton.prominentForeground: "${white}"
extensionButton.prominentHoverBackground: "${buttonHoverBg}"

# 进度条
progressBar.background: "${primary}"

# 括号高亮（保持不变）
editorBracketHighlight.foreground1: "${bracket1}"
editorBracketHighlight.foreground2: "${bracket2}"
editorBracketHighlight.foreground3: "${bracket3}"
editorBracketHighlight.foreground4: "${bracket4}"
editorBracketHighlight.foreground5: "${bracket5}"
editorBracketHighlight.foreground6: "${bracket6}"
editorBracketHighlight.unexpectedBracket.foreground: "${error}"
