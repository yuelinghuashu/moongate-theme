# HTML 特定规则
# 只保留 base.yaml 未覆盖的 HTML 独有规则
tokenColors:
  - name: HTML Doctype
    scope: ["meta.tag.sgml.html", "entity.name.tag.doctype.html"]
    settings:
      foreground: "${border}"

  - name: HTML Attribute Value
    scope: ["string.quoted.double.html", "string.quoted.single.html"]
    settings:
      foreground: "${success}"

  - name: HTML/Vue Text Content
    scope: ["text.html.basic", "text.html.vue text", "text.html.derivative"]
    settings:
      foreground: "${variableDim}"

  - name: HTML Script Tag Content
    scope: ["source.js.embedded.html"]
    settings:
      foreground: "${text}"

  - name: HTML Style Tag Content
    scope: ["source.css.embedded.html"]
    settings:
      foreground: "${text}"
