# Moongate Dark 核心色盘
# 包含所有在主题中使用的颜色变量，按功能分组
# 透明度颜色通过基础色+透明度后缀处理（如 ${primary}20）

# ==================== 月语义主色 ====================
primary: "#3b82f6"           # 主蓝 - 晴夜月光（关键字、焦点、活动项）
success: "#34d399"           # 月灵花绿 - 成功、字符串、插入内容
warning: "#fbbf24"           # 月光黄 - 警告、数字、常量、类
error: "#f87171"             # 红月 - 错误、删除、标签
highlight: "#7dd3fc"         # 发光蓝 - 高亮元素（链式第一层方法、JSDoc类型）
cyan: "#22d3ee"              # 青月 - 正则表达式、类型参数
purple: "#c084fc"            # 月虹紫 - 装饰器、Vue指令、特殊元数据

# ==================== 功能色（语法）====================
function: "#87cefa"          # 函数名（普通调用和定义）
operator: "#8596a5"          # 操作符、冒号、点
comment: "#a5b4cb"           # 注释（比 textMuted 稍亮）
variable: "#d4dcee"          # 普通变量（局部变量）
variableDim: "#cbd5e1"       # 降权变量（参数、只读变量、解构变量）
textMuted: "#94a3b8"         # 元数据、注释、辅助文字
punctuation: "#64748b"       # 深灰标点（如 JSDoc括号、废弃标记）

# ==================== 背景层级 ====================
bg: "#0f172a"                # 最底层背景（编辑器）
bgElevated: "#131c31"        # 卡片/浮层（预览卡、状态栏悬停项）
bgMuted: "#1e293b"           # 侧边栏、代码块、输入框背景
bgHover: "#3b82f620"         # 悬停背景（半透明主蓝）
bgActive: "#3b82f640"        # 激活背景（半透明主蓝）
hoverBg: "#252e40"           # 悬停背景（灰色，用于列表、选项卡）
selectedBg: "#1e3a8a"        # 选中背景（深蓝，用于列表选中项、快速选择器）

# ==================== 文本层级 ====================
text: "#e2e8f0"              # 正文（编辑器前景）
textDim: "#cbd5e1"           # 次要正文（状态栏文字、降权变量）
textInactive: "#94a3b8"      # 非活跃状态文字（同 textMuted）

# ==================== 边框 ====================
border: "#2d3748"            # 常规边框（面板、侧边栏、分割线）
borderHover: "#3b82f6"       # 悬停边框高亮（主蓝）
borderDim: "#8596a5"         # 操作符边框（与操作符同色）

# ==================== 交互控件 ====================
buttonHoverBg: "#2563eb"     # 按钮悬停背景（深蓝）
white: "#ffffff"             # 纯白（徽章、按钮文字、选中项文字）

# ==================== 终端 ANSI 色 ====================
ansiBlack: "#1e293b"         # 黑色（对应 bgMuted）
ansiRed: "#f87171"           # 红色（对应 error）
ansiGreen: "#34d399"         # 绿色（对应 success）
ansiYellow: "#fbbf24"        # 黄色（对应 warning）
ansiBlue: "#3b82f6"          # 蓝色（对应 primary）
ansiMagenta: "#c084fc"       # 品红（对应 purple）
ansiCyan: "#22d3ee"          # 青色（对应 cyan）
ansiWhite: "#e2e8f0"         # 白色（对应 text）
ansiBrightBlack: "#2d3748"   # 亮黑（对应 border）
ansiBrightRed: "#f87171"     # 亮红
ansiBrightGreen: "#34d399"   # 亮绿
ansiBrightYellow: "#fbbf24"  # 亮黄
ansiBrightBlue: "#3b82f6"    # 亮蓝
ansiBrightMagenta: "#c084fc" # 亮品红
ansiBrightCyan: "#22d3ee"    # 亮青
ansiBrightWhite: "#ffffff"   # 亮白（对应 white）

# ==================== 括号高亮层级 ====================
bracket1: "#7dd3fc"          # 第1层 - 发光蓝（函数色）
bracket2: "#34d399"          # 第2层 - 月灵花绿（字符串色）
bracket3: "#fbbf24"          # 第3层 - 月光黄（数字色）
bracket4: "#c084fc"          # 第4层 - 月虹紫（装饰器色）
bracket5: "#3b82f6"          # 第5层 - 主蓝（关键字色）
bracket6: "#94a3b8"          # 第6层 - 月影灰（注释色）

# ==================== 其他 ====================
scrollbar: "#3b82f6"         # 滚动条滑块基础色（透明度在构建时添加）
gitAdded: "#34d399"          # Git新增（同 success）
gitModified: "#fbbf24"       # Git修改（同 warning）
gitDeleted: "#f87171"        # Git删除（同 error）
gitUntracked: "#94a3b8"      # Git未跟踪
gitIgnored: "#2d3748"        # Git忽略
debugStart: "#34d399"        # 调试开始（同 success）
debugPause: "#fbbf24"        # 调试暂停（同 warning）
debugStop: "#f87171"         # 调试停止（同 error）