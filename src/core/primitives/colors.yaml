# ==================== 原始色值 ====================
# 从 colors-dark.yaml 和 colors-light.yaml 提取
# 按色相-明度命名，作为所有主题的基础构建块

# ==================== 蓝色系 ====================
blue-500: "#3b82f6" # 深色主蓝
blue-600: "#2563eb" # 深色按钮悬停
blue-700: "#0284c7" # 浅色主蓝
blue-800: "#0369a1" # 浅色高亮/函数
blue-900: "#1e3a8a" # 深色选中背景

# 发光蓝（特殊）
blue-glow: "#7dd3fc" # 深色高亮
blue-glow-dark: "#87cefa" # 深色函数

# ==================== 绿色系 ====================
green-400: "#34d399" # 深色成功
green-600: "#059669" # 浅色成功
green-700: "#10b981" # 浅色亮绿（ansiBrightGreen）

# ==================== 黄色系 ====================
yellow-400: "#fbbf24" # 深色警告
yellow-500: "#f59e0b" # 浅色警告（未使用）
yellow-600: "#d97706" # 浅色亮黄（ansiBrightYellow）
yellow-700: "#b45309" # 浅色警告/琥珀

# ==================== 红色系 ====================
red-400: "#f87171" # 深色错误
red-500: "#ef4444" # 浅色错误（未使用）
red-600: "#dc2626" # 浅色亮红（ansiBrightRed）
red-700: "#b91c1c" # 浅色错误

# ==================== 青色系 ====================
cyan-400: "#22d3ee" # 深色青色
cyan-500: "#0891b2" # 浅色亮青（ansiBrightCyan）
cyan-700: "#0e7490" # 浅色青色

# ==================== 紫色系 ====================
purple-400: "#c084fc" # 深色紫色
purple-500: "#9333ea" # 浅色亮紫（ansiBrightMagenta）
purple-700: "#7e22ce" # 浅色紫色

# ==================== 灰阶（冷调基底）====================
# 深色模式灰阶
gray-900: "#0f172a" # 深色编辑器背景
gray-850: "#131c31" # 深色卡片/浮层
gray-800: "#1e293b" # 深色侧边栏/代码块
gray-750: "#252e40" # 深色悬停背景
gray-700: "#2d3748" # 深色边框
gray-600: "#475569" # 深色操作符/降权变量
gray-550: "#7a8c9e" # 注释文字专用（textMuted）
gray-500: "#94a3b8" # 深色模式辅助文字（textMuted）
gray-525: "#a5b4cb" # 深色模式注释（comment，比 gray-500 稍亮）
gray-400: "#94a3b8" # 深色标点/非活跃
gray-300: "#cbd5e1" # 深色降权变量/浅色边框
gray-200: "#e2e8f0" # 深色正文/浅色选中背景
gray-100: "#f1f5f9" # 浅色次级背景
gray-50: "#f9fafb" # 浅色编辑器背景

# ==================== 纯色 ====================
white: "#ffffff" # 纯白
black: "#000000" # 纯黑
