# Python 特定规则
# 只保留 base.yaml 未覆盖的 Python 独有规则
tokenColors:
  # ========== 函数定义（覆盖 base，加粗） ==========
  - name: Python - Function Definition
    scope:
      - "entity.name.function.python"
      - "meta.function.python entity.name.function"
    settings:
      foreground: "${function}"
      fontStyle: "bold"

  # ========== 函数调用（覆盖 base，不加粗） ==========
  - name: Python - Function Calls
    scope:
      - "meta.function-call.python"
      - "meta.function-call.generic.python"
      - "support.function.python"
      - "support.function.builtin.python"
    settings:
      foreground: "${function}"

  # ========== Python 独有 ==========
  - name: Python Decorators
    scope: ["entity.name.function.decorator.python", "meta.decorator.python"]
    settings:
      foreground: "${purple}"
      fontStyle: "italic"

  - name: Python Dictionary Keys
    scope: ["meta.mapping.key.python", "string.unquoted.key.python"]
    settings:
      foreground: "${variableDim}"
