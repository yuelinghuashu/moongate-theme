# CSS / SCSS 特定规则
# 只保留 base.yaml 未覆盖的 CSS 独有规则
tokenColors:
  - name: CSS Properties
    scope: ["support.type.property-name.css", "meta.property-name.css"]
    settings:
      foreground: "${highlight}"

  - name: CSS Variable Definitions
    scope:
      ["meta.property-list.css variable", "source.css variable", "variable.css"]
    settings:
      foreground: "${highlight}"

  - name: CSS Variable Usage
    scope: ["meta.function.css variable", "support.constant.property-value.css"]
    settings:
      foreground: "${highlight}"

  - name: CSS Pseudo
    scope:
      - "entity.other.attribute-name.pseudo-class.css"
      - "entity.other.attribute-name.pseudo-element.css"
    settings:
      foreground: "${highlight}"
      fontStyle: "italic"
