# Moongate Light 核心色盘
# 基于“晨曦映照”理念：冷调基底 + 深墨语义
# 保持与 Dark 版 1:1 变量映射，确保工程化构建无缝切换

# ==================== 月语义主色（重力补偿版） ====================
primary: "#0284c7"           # 晨曦月光 - 深天蓝（代替原主蓝，增加白底对比度）
success: "#059669"           # 墨灵花绿 - 深翠绿（代替亮绿，防止视觉发虚）
warning: "#b45309"           # 琥珀月黄 - 焦糖黄（代替明黄，确保在白底上清晰可见）
error: "#b91c1c"             # 绛红月 - 深红色（强化警示感）
highlight: "#0369a1"         # 映射蓝 - 用于高亮，保持冷色调权重
cyan: "#0e7490"              # 深青月 - 沉稳的青色
purple: "#7e22ce"            # 墨月紫 - 浓郁的紫色

# ==================== 功能色（墨迹感语法） ====================
function: "#0369a1"          # 函数名 - 钢笔蓝（视觉中心）
operator: "#475569"          # 操作符 - 石板灰（提供明确的逻辑骨架）
comment: "#64748b"           # 注释 - 中灰（确保日光下仍有基本可读性）
variable: "#1e293b"          # 普通变量 - 极深灰蓝（代码的视觉基石）
variableDim: "#475569"       # 降权变量 - 灰度降低，产生层级
textMuted: "#64748b"         # 辅助文字 - 保持低调
punctuation: "#94a3b8"       # 深灰标点 - 像纸张上的辅助线

# ==================== 背景层级（冰月白质感） ====================
bg: "#f9fafb"                # 最底层背景 - 极浅冷白（带 2% 蓝偏置，消除发黄感）
bgElevated: "#ffffff"        # 浮层 - 纯白（产生物理高度感）
bgMuted: "#f1f5f9"           # 次级背景 - 浅灰蓝（用于侧边栏和代码块）
bgHover: "#0284c715"         # 悬停背景 - 极淡蓝叠加
bgActive: "#0284c725"        # 激活背景 - 稍深的蓝叠加
hoverBg: "#f1f5f9"           # 列表悬停色
selectedBg: "#e2e8f0"        # 列表选中色

# ==================== 海拔系统（新增） ====================
surfaceGround: "#f9fafb"      # 月面（0dp）- 编辑器背景（与 bg 一致）
surfaceRaised: "#f2f4f8"      # 隆起（2dp）- 侧边栏、活动栏，比 ground 暗约 3%
surfaceFloating: "#e9edf3"    # 漂浮（8dp）- 弹窗、菜单，比 raised 再暗 3%
surfaceTooltip: "#dfe5ee"     # 提示（12dp）- 工具提示，最深层
borderFloating: "#0284c780"   # 半透明晨曦蓝，用于弹窗边框，增加边界清晰度

# ==================== 文本层级 ====================
text: "#1e293b"              # 正文 - 核心深度（Slate 900）
textDim: "#475569"           # 次要正文
textInactive: "#94a3b8"      # 非活跃状态文字

# ==================== 边框（折痕感） ====================
border: "#e2e8f0"            # 常规边框 - 浅灰（像纸张折痕一样克制）
borderHover: "#0284c7"       # 悬停边框 - 唤醒主色
borderDim: "#cbd5e1"         # 弱化边框

# ==================== 交互控件 ====================
buttonHoverBg: "#0284c7"     # 按钮悬停背景 - 使用浅色版 primary
white: "#ffffff"             # 纯白 - 保持不变，用于高亮徽章或深色按钮文字

# ==================== 终端 ANSI 色（日光适配） ====================
ansiBlack: "#1e293b"
ansiRed: "#b91c1c"
ansiGreen: "#059669"
ansiYellow: "#b45309"
ansiBlue: "#0284c7"
ansiMagenta: "#7e22ce"
ansiCyan: "#0e7490"
ansiWhite: "#f9fafb"
ansiBrightBlack: "#64748b"
ansiBrightRed: "#dc2626"
ansiBrightGreen: "#10b981"
ansiBrightYellow: "#d97706"
ansiBrightBlue: "#2563eb"
ansiBrightMagenta: "#9333ea"
ansiBrightCyan: "#0891b2"
ansiBrightWhite: "#ffffff"

# ==================== 括号高亮层级（深色映射） ====================
bracket1: "#0284c7"          # 第1层 - 主蓝
bracket2: "#059669"          # 第2层 - 墨绿
bracket3: "#b45309"          # 第3层 - 琥珀
bracket4: "#7e22ce"          # 第4层 - 深紫
bracket5: "#0e7490"          # 第5层 - 深青
bracket6: "#64748b"          # 第6层 - 灰色

# ==================== 其他（编辑器 / Git / 调试） ====================
scrollbar: "#0284c7"         # 滚动条滑块基础色 - 使用浅色版 primary
gitAdded: "#059669"          # Git 新增 - 对应浅色版 success
gitModified: "#b45309"       # Git 修改 - 对应浅色版 warning
gitDeleted: "#b91c1c"        # Git 删除 - 对应浅色版 error
gitUntracked: "#64748b"      # Git 未跟踪 - 使用浅色版 comment 保持低调
gitIgnored: "#cbd5e1"        # Git 忽略 - 使用较淡的灰色 borderDim
debugStart: "#059669"        # 调试开始 - 对应 success
debugPause: "#b45309"        # 调试暂停 - 对应 warning
debugStop: "#b91c1c"         # 调试停止 - 对应 error